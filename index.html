<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sliding Door Reveal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">
  <!-- IMAGE BEHIND -->
  <div class="background"></div>

  <!-- DOOR ON TOP -->
  <div class="door-frame">
    <div class="panel left"></div>
    <div class="panel right" id="door"></div>
  </div>
</div>

<button onclick="toggleDoor()">OPEN / CLOSE</button>

<script src="script.js"></script>
</body>
</html>
